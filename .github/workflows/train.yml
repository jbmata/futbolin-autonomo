name: Entrenar Agente RL

on:
  workflow_dispatch:
    inputs:
      timesteps:
        description: 'Pasos de entrenamiento'
        required: true
        default: '300000'
        type: choice
        options: ['100000', '300000', '500000', '1000000']
      curriculum:
        description: 'Usar entrenamiento curricular'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']
      n_envs:
        description: 'Entornos paralelos'
        required: true
        default: '4'
        type: choice
        options: ['2', '4', '8']

  push:
    branches: [dev1]
    paths: ['**.py', 'requirements.txt']

# Permisos para que el workflow pueda hacer commit al repo
permissions:
  contents: write

concurrency:
  group: train-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  train:
    name: Entrenar PPO
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # historial completo para poder hacer push

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Entrenar agente RL
        run: |
          CURRICULUM_FLAG=""
          if [ "${{ github.event.inputs.curriculum || 'true' }}" = "true" ]; then
            CURRICULUM_FLAG="--curriculum"
          fi

          python train.py \
            --timesteps ${{ github.event.inputs.timesteps || '300000' }} \
            --n-envs   ${{ github.event.inputs.n_envs    || '4' }} \
            $CURRICULUM_FLAG

      # Guardar modelo como artefacto descargable (backup)
      - name: Guardar artefacto
        uses: actions/upload-artifact@v4
        with:
          name: modelo-ppo-run${{ github.run_number }}
          path: |
            models/foosball_ppo_final.zip
            models/best/best_model.zip
          retention-days: 90

      # Hacer commit del modelo entrenado de vuelta al repo
      - name: Commit modelo al repositorio
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Añadir solo los modelos final y mejor (no checkpoints intermedios)
          git add models/foosball_ppo_final.zip models/best/ || true

          # Solo hacer commit si hay cambios
          if git diff --staged --quiet; then
            echo "Sin cambios en el modelo, nada que commitear."
          else
            git commit -m "model: PPO entrenado run #${{ github.run_number }} (${{ github.event.inputs.timesteps || '300000' }} steps)"
            git fetch origin ${{ github.ref_name }}
            git rebase FETCH_HEAD
            git push origin HEAD:${{ github.ref_name }}
            echo "Modelo guardado en el repositorio."
          fi

      - name: Resumen
        run: |
          echo "## Entrenamiento completado - Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parametro | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Timesteps | ${{ github.event.inputs.timesteps || '300000' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Curriculo | ${{ github.event.inputs.curriculum || 'true' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rama | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "El modelo esta disponible en \`models/foosball_ppo_final.zip\` y como artefacto." >> $GITHUB_STEP_SUMMARY
